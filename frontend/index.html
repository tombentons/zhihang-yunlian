<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#0d4f8b" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="智航云连" />
    <meta name="description" content="智航云连 - 港航集疏运数字服务平台，运力直连、港区动态、智能拼单" />
    <link rel="icon" type="image/svg+xml" href="/icons/icon-192.svg" />
    <link rel="apple-touch-icon" href="/icons/icon-192.svg" />
    <link rel="manifest" href="/manifest.json" />
    <title>智航云连 - 港航集疏运数字服务平台</title>
    <style>
      /* 防止iOS橡皮筋滚动 */
      html, body { overscroll-behavior: none; }
      /* PWA安装横幅样式 */
      #pwa-install-banner {
        display: none;
        position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
        background: linear-gradient(135deg, #0d4f8b, #0ea5e9); color: white;
        padding: 12px 24px; border-radius: 12px; box-shadow: 0 8px 32px rgba(0,0,0,0.2);
        z-index: 9999; font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif;
        font-size: 14px; cursor: pointer; text-align: center; max-width: 90%; min-width: 280px;
      }
      #pwa-install-banner .close-btn {
        position: absolute; top: -8px; right: -8px; width: 24px; height: 24px;
        background: #ff5c5c; border-radius: 50%; color: white; border: none;
        font-size: 12px; cursor: pointer; display: flex; align-items: center; justify-content: center;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <div id="pwa-install-banner">
      <button class="close-btn" onclick="this.parentElement.style.display='none'">&times;</button>
      点击这里将「智航云连」添加到桌面，获得原生APP体验
    </div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      // Service Worker 注册
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').catch(() => {});
        });
      }
      // PWA安装提示
      let deferredPrompt;
      window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;
        const banner = document.getElementById('pwa-install-banner');
        banner.style.display = 'block';
        banner.addEventListener('click', async (ev) => {
          if (ev.target.classList.contains('close-btn')) return;
          if (deferredPrompt) {
            deferredPrompt.prompt();
            const result = await deferredPrompt.userChoice;
            deferredPrompt = null;
            banner.style.display = 'none';
          }
        });
      });
    </script>
  </body>
</html>
